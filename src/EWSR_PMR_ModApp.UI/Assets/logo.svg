<!--
  PMR Content Manager logo — Motorsport badge inspired by Content Manager aesthetics.
  Editable SVG source of truth.  WPF uses Assets/Logo.xaml (DrawingImage).
  Export at 16/32/48/256 px to generate logo.ico for packaging.

  Design: Circular badge with stylized speedometer gauge and racing chevrons.
    • Outer ring: Surface0Brush (#313244) to #45475a gradient — racing-badge border
    • Inner disc: MantleBrush (#181825) to #1e1e2e gradient — dark background
    • Gauge arc + needle + ticks: AccentBrush (#89B4FA) — motorsport dashboard feel
    • Racing chevrons at bottom: AccentBrush — speed/motion indicator

  Inspiration: Content Manager's circular badge, gauge/speedometer motif,
  clean motorsport aesthetic — original design for PMR Content Manager.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#45475a"/>
      <stop offset="100%" stop-color="#313244"/>
    </linearGradient>
  </defs>

  <!-- Outer ring (badge border) -->
  <circle cx="32" cy="32" r="30" fill="url(#ringGrad)"/>

  <!-- Inner disc (dark background) -->
  <circle cx="32" cy="32" r="26" fill="url(#bgGrad)"/>

  <!-- Gauge arc (speedometer inspired) — 180° arc at top -->
  <path d="M14 36 A20 20 0 0 1 50 36" 
        fill="none" stroke="#89B4FA" stroke-width="3" 
        stroke-linecap="round" opacity="0.85"/>

  <!-- Gauge tick marks -->
  <g stroke="#89B4FA" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <line x1="14" y1="36" x2="17" y2="34"/>
    <line x1="19" y1="23" x2="22" y2="25"/>
    <line x1="32" y1="16" x2="32" y2="20"/>
    <line x1="45" y1="23" x2="42" y2="25"/>
    <line x1="50" y1="36" x2="47" y2="34"/>
  </g>

  <!-- Gauge needle (pointing towards high speed — top-right) -->
  <line x1="32" y1="38" x2="42" y2="22" stroke="#89B4FA" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Needle pivot point -->
  <circle cx="32" cy="38" r="4" fill="#89B4FA"/>
  <circle cx="32" cy="38" r="2" fill="#11111b"/>

  <!-- Speed chevrons (bottom, racing feel) -->
  <g fill="none" stroke="#89B4FA" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <path d="M24 50 L28 46 L24 42"/>
    <path d="M32 50 L36 46 L32 42"/>
    <path d="M40 50 L44 46 L40 42"/>
  </g>
</svg>
