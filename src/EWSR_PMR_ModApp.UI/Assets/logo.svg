  <title id="title">PMR CM letter-only logo</title>
  <desc id="desc">A transparent SVG letter mark for the Project Motor Racing Content Manager app, using a black, white, and muted gold color scheme. The letters PMR sit on the first row and CM sits on the second row.</desc>
  <metadata>
    <![CDATA[
      Project: PMR Content Manager
      Mark: PMR / CM stacked letter-only logo
      Colors: asphalt black #050505, pit wall white #FFFFFF, brass gold #B99A5D
      Notes: No badge, no emblem, no background panel. Letter shapes only.
      Output: SVG vector artwork; transparent canvas; text converted to paths for portability.
    ]]>
