<!-- PMR Mod Manager logo — "Checkered Mod" mark.
     Editable SVG source of truth.  WPF uses Assets/Logo.xaml (DrawingImage).
     Export at 16/32/48/256 px to generate logo.ico for packaging.

     Design: flat 2×2 racing-flag grid on a dark rounded background.
       • Top-left  + bottom-right = AccentBrush (#89B4FA)
       • Top-right + bottom-left  = Surface0Brush (#313244)
       • Background = MantleBrush (#181825)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" ry="6" fill="#181825"/>
  <!-- Accent squares: top-left and bottom-right -->
  <rect x="3"  y="3"  width="13" height="13" fill="#89B4FA"/>
  <rect x="16" y="16" width="13" height="13" fill="#89B4FA"/>
  <!-- Surface squares: top-right and bottom-left -->
  <rect x="16" y="3"  width="13" height="13" fill="#313244"/>
  <rect x="3"  y="16" width="13" height="13" fill="#313244"/>
</svg>
